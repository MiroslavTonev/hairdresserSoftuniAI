spring.application.name=hairdresser

# H2 file-mode database - persists between restarts
spring.datasource.url=jdbc:h2:file:./hairdresser;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (useful during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed data runs after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
